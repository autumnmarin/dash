<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control - Assignment Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== CSS RESET & VARIABLES ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #121218;
  --bg-card: #1a1a24;
  --bg-card-hover: #22222e;
  --text-primary: #e8e8f0;
  --text-secondary: #9898a8;
  --text-muted: #5a5a6e;
  --accent: #e63946;
  --accent-dark: #b42d38;
  --accent-glow: rgba(230, 57, 70, 0.3);
  --pool-blue: #00b4d8;
  --pool-blue-dark: #0096b7;
  --pool-glow: rgba(0, 180, 216, 0.3);
  --amber: #FFBF00;
  --cream: #e8e8f0;
  --red: #e63946;
  --red-dark: #922;
  --green: #2ecc71;
  --blue: #00b4d8;
  --purple: #9b59b6;
  --border: rgba(230, 57, 70, 0.15);
  --shadow: 0 4px 20px rgba(0,0,0,0.6);
  --radius: 12px;
  --transition: 0.3s ease;
}

[data-theme="light"] {
  --bg-primary: #f0f2f5;
  --bg-secondary: #e4e7ec;
  --bg-card: #fff;
  --bg-card-hover: #f5f7fa;
  --text-primary: #1a1a2e;
  --text-secondary: #4a4a5e;
  --text-muted: #7a7a8e;
  --border: rgba(230, 57, 70, 0.2);
  --shadow: 0 4px 20px rgba(0,0,0,0.1);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}

h1, h2, h3, h4 { font-family: 'Orbitron', sans-serif; }

button { cursor: pointer; font-family: 'Nunito', sans-serif; border: none; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--accent-dark); border-radius: 4px; }

/* ===== LOGIN SCREEN ===== */
.login-screen {
  position: fixed; inset: 0;
  background: var(--bg-primary);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  padding: 20px;
  background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
}
.login-screen.hidden { display: none; }
.login-box {
  background: var(--bg-card);
  border: 2px solid var(--accent-dark);
  border-radius: 20px;
  padding: 40px 36px;
  text-align: center;
  max-width: 400px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 80px var(--accent-glow);
  position: relative;
  overflow: hidden;
}
.login-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: scanLine 2s ease-in-out infinite;
}
@keyframes scanLine {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}
.login-box h1 {
  font-family: 'Orbitron', sans-serif;
  color: var(--accent);
  font-size: 1.6rem;
  margin-bottom: 4px;
  text-shadow: 0 0 30px var(--accent-glow);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.login-box .subtitle {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 28px;
  letter-spacing: 1px;
}
.login-box input {
  width: 100%; padding: 14px 18px;
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: 'Nunito', sans-serif;
  font-size: 1.05rem;
  text-align: center;
  transition: border var(--transition);
}
.login-box input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow);
}
.login-box input::placeholder { color: var(--text-muted); }
.login-box .login-btn {
  display: block; width: 100%;
  margin-top: 16px; padding: 14px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff;
  font-weight: 800; font-size: 1.05rem;
  border-radius: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all var(--transition);
}
.login-box .login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px var(--accent-glow);
}
.login-box .login-hint {
  color: var(--text-muted);
  font-size: 0.8rem;
  margin-top: 12px;
}

/* ===== STICKY HEADER ===== */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
  border-bottom: 2px solid var(--border);
  padding: 12px 20px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
}
.header-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}
.header-left {
  display: flex; align-items: center; gap: 14px;
}
.header-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem; font-weight: 900;
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent-glow);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.header-user {
  display: flex; align-items: center; gap: 6px;
  background: rgba(230, 57, 70, 0.08);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px 4px 8px;
  font-size: 0.85rem; color: var(--text-secondary);
}
.header-user .user-avatar {
  width: 22px; height: 22px;
  background: linear-gradient(135deg, var(--pool-blue-dark), var(--pool-blue));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #fff; font-weight: 900;
}
.header-user .logout-btn {
  background: none; color: var(--text-muted);
  font-size: 0.75rem; padding: 0 0 0 6px;
  text-decoration: underline;
  transition: color var(--transition);
}
.header-user .logout-btn:hover { color: var(--accent); }

.header-stats {
  display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
}

/* Coin display — now "points" with pool-blue accent */
.coin-display {
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, rgba(0,180,216,0.15), rgba(0,180,216,0.05));
  border: 1px solid var(--pool-blue-dark);
  border-radius: 30px; padding: 6px 16px;
  font-weight: 800; font-size: 1.1rem; color: var(--pool-blue);
  position: relative; overflow: visible;
}
.coin-icon {
  width: 28px; height: 28px;
  background: radial-gradient(circle at 35% 35%, #48cae4, #00b4d8, #0077b6);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: #fff;
  box-shadow: 0 0 10px var(--pool-glow);
  animation: ballBob 2s ease-in-out infinite;
}
@keyframes ballBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

/* Streak */
.streak-display {
  display: flex; align-items: center; gap: 5px;
  color: var(--accent); font-weight: 700; font-size: 0.95rem;
}

/* XP Bar */
.xp-container {
  display: flex; align-items: center; gap: 8px; min-width: 180px;
}
.xp-bar-outer {
  flex: 1; height: 14px;
  background: rgba(0,0,0,0.4);
  border-radius: 7px; overflow: hidden;
  border: 1px solid var(--border);
}
.xp-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-dark), var(--accent), #ff6b6b);
  border-radius: 7px;
  transition: width 0.6s ease;
  box-shadow: 0 0 8px var(--accent-glow);
  position: relative;
}
.xp-bar-inner::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
  animation: xpShine 2s ease-in-out infinite;
}
@keyframes xpShine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.xp-label {
  font-size: 0.75rem; font-weight: 700; color: var(--accent);
  white-space: nowrap;
  font-family: 'Orbitron', sans-serif;
}
.level-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem; color: var(--pool-blue);
  font-weight: 700; white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Header controls */
.header-controls {
  display: flex; align-items: center; gap: 8px;
}
.icon-btn {
  width: 36px; height: 36px;
  background: rgba(230, 57, 70, 0.1);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
  font-size: 1.1rem;
  transition: all var(--transition);
}
.icon-btn:hover {
  background: rgba(230, 57, 70, 0.25);
  transform: scale(1.1);
}

/* ===== MAIN CONTAINER ===== */
.container {
  max-width: 1100px; margin: 0 auto;
  padding: 20px;
}

/* ===== TOOLBAR ===== */
.toolbar {
  display: flex; flex-wrap: wrap; gap: 10px;
  align-items: center; margin-bottom: 20px;
}
.view-tabs {
  display: flex; gap: 4px;
  background: var(--bg-secondary);
  border-radius: 10px; padding: 4px;
  border: 1px solid var(--border);
}
.view-tab {
  padding: 8px 16px;
  border-radius: 8px;
  background: transparent;
  color: var(--text-secondary);
  font-weight: 600; font-size: 0.85rem;
  transition: all var(--transition);
}
.view-tab.active {
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff;
  box-shadow: 0 2px 10px var(--accent-glow);
}
.view-tab:hover:not(.active) { color: var(--accent); }

.sort-select {
  padding: 8px 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
}

.search-box {
  flex: 1; min-width: 180px;
  padding: 8px 14px 8px 36px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  transition: border var(--transition);
}
.search-box:focus {
  outline: none;
  border-color: var(--accent);
}
.search-wrapper {
  position: relative; flex: 1; min-width: 180px;
}
.search-wrapper::before {
  content: '\u{1F50D}';
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.9rem; opacity: 0.5;
  pointer-events: none;
}

/* ===== SECTIONS / ACCORDION ===== */
.section {
  margin-bottom: 16px;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--bg-card);
  transition: all var(--transition);
}
.section-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}
.section-header:hover { background: var(--bg-card-hover); }

.section-color {
  width: 14px; height: 14px;
  border-radius: 4px; flex-shrink: 0;
}
.section-name {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.9rem;
  flex: 1;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.section-badge {
  background: rgba(230, 57, 70, 0.15);
  color: var(--accent);
  font-size: 0.75rem; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
}
.section-progress {
  width: 80px; height: 8px;
  background: rgba(0,0,0,0.4);
  border-radius: 4px; overflow: hidden;
}
.section-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--pool-blue-dark), var(--pool-blue));
  border-radius: 4px;
  transition: width 0.4s ease;
}
.section-chevron {
  font-size: 0.9rem; color: var(--text-muted);
  transition: transform var(--transition);
}
.section.collapsed .section-chevron { transform: rotate(-90deg); }
.section-body { padding: 0 18px 14px; }
.section.collapsed .section-body { display: none; }

.section-actions {
  display: flex; gap: 8px; margin-bottom: 10px;
}
.btn-complete-all {
  padding: 6px 14px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff; border-radius: 8px;
  font-size: 0.8rem; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all var(--transition);
}
.btn-complete-all:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }

/* ===== ASSIGNMENT CARD ===== */
.assignment {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  margin-bottom: 8px;
  background: var(--bg-secondary);
  border: 1px solid transparent;
  transition: all var(--transition);
  animation: slideIn 0.3s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}
.assignment:hover {
  border-color: var(--border);
  background: var(--bg-card-hover);
}
.assignment.completed-card {
  opacity: 0.45;
}
.assignment.completed-card .assignment-title {
  text-decoration: line-through;
}
.assignment.overdue {
  border-color: var(--accent);
  background: rgba(230, 57, 70, 0.08);
  animation: overdueFlash 2s ease-in-out infinite;
}
@keyframes overdueFlash {
  0%, 100% { border-color: var(--accent); }
  50% { border-color: rgba(230, 57, 70, 0.4); }
}

/* Custom checkbox */
.checkbox-wrapper {
  position: relative; flex-shrink: 0;
  width: 28px; height: 28px; margin-top: 2px;
}
.checkbox-wrapper input {
  position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2;
}
.checkbox-visual {
  width: 28px; height: 28px;
  border: 2px solid var(--pool-blue-dark);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  font-size: 16px;
}
.checkbox-wrapper input:checked + .checkbox-visual {
  background: linear-gradient(135deg, var(--pool-blue-dark), var(--pool-blue));
  border-color: var(--pool-blue);
  animation: checkBounce 0.4s ease;
}
@keyframes checkBounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.3); }
  60% { transform: scale(0.9); }
  100% { transform: scale(1); }
}
.checkbox-wrapper input:checked + .checkbox-visual::after {
  content: '\2714'; color: #fff; font-weight: 900;
}

.assignment-content { flex: 1; min-width: 0; }
.assignment-title {
  font-weight: 700; font-size: 0.95rem;
  margin-bottom: 4px;
}
.assignment-meta {
  display: flex; flex-wrap: wrap; gap: 8px;
  font-size: 0.78rem; color: var(--text-muted);
}
.assignment-meta span { display: flex; align-items: center; gap: 3px; }

.priority-dot {
  width: 8px; height: 8px;
  border-radius: 50%; display: inline-block;
}
.priority-low { background: var(--pool-blue); }
.priority-med { background: var(--amber); }
.priority-high { background: var(--accent); }

.badge {
  font-size: 0.7rem; font-weight: 700;
  padding: 2px 8px; border-radius: 12px;
}
.badge-repeat {
  background: rgba(0, 180, 216, 0.15);
  color: var(--pool-blue);
}
.badge-overdue {
  background: rgba(230, 57, 70, 0.2);
  color: var(--accent);
}
.badge-early {
  background: rgba(46, 204, 113, 0.2);
  color: var(--green);
}

.assignment-actions {
  display: flex; gap: 4px; flex-shrink: 0;
}
.assignment-actions button {
  width: 28px; height: 28px;
  background: transparent;
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 0.85rem;
  transition: all var(--transition);
  display: flex; align-items: center; justify-content: center;
}
.assignment-actions button:hover {
  background: rgba(0,180,216,0.1);
  color: var(--pool-blue);
}
.delete-btn:hover { color: var(--accent) !important; background: rgba(230,57,70,0.1) !important; }

/* ===== FAB ===== */
.fab {
  position: fixed; bottom: 28px; right: 28px;
  width: 60px; height: 60px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; color: #fff; font-weight: 900;
  box-shadow: 0 4px 24px var(--accent-glow), 0 0 40px rgba(230,57,70,0.15);
  z-index: 90;
  transition: all var(--transition);
  animation: fabPulse 2s ease-in-out infinite alternate;
}
@keyframes fabPulse {
  from { box-shadow: 0 4px 24px var(--accent-glow); }
  to { box-shadow: 0 4px 40px rgba(230,57,70,0.5), 0 0 60px rgba(230,57,70,0.2); }
}
.fab:hover { transform: scale(1.1) rotate(90deg); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity var(--transition);
}
.modal-overlay.active { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  transform: translateY(20px);
  transition: transform var(--transition);
  position: relative;
}
.modal::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.modal-overlay.active .modal { transform: translateY(0); }

.modal h2 {
  color: var(--accent); margin-bottom: 20px;
  font-size: 1.1rem;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.modal label {
  display: block; font-weight: 700;
  font-size: 0.85rem; color: var(--text-secondary);
  margin-bottom: 6px; margin-top: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 0.75rem;
}
.modal input[type="text"],
.modal input[type="date"],
.modal textarea,
.modal select {
  width: 100%; padding: 10px 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  transition: border var(--transition);
}
.modal input:focus, .modal textarea:focus, .modal select:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
}
.modal textarea { resize: vertical; min-height: 60px; }

.type-toggle {
  display: flex; gap: 4px;
  background: var(--bg-secondary);
  border-radius: 8px; padding: 4px;
  border: 1px solid var(--border);
}
.type-toggle button {
  flex: 1; padding: 8px;
  border-radius: 6px;
  background: transparent;
  color: var(--text-secondary);
  font-weight: 600; font-size: 0.85rem;
  transition: all var(--transition);
}
.type-toggle button.active {
  background: var(--accent);
  color: #fff;
}

.days-picker {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.day-btn {
  width: 40px; height: 40px;
  border-radius: 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-weight: 700; font-size: 0.8rem;
  transition: all var(--transition);
}
.day-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.modal-actions {
  display: flex; gap: 10px; margin-top: 24px;
}
.btn-save {
  flex: 1; padding: 12px;
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  color: #fff;
  font-weight: 800; font-size: 0.95rem;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all var(--transition);
}
.btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-cancel {
  padding: 12px 20px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-weight: 600;
  border-radius: 10px;
  transition: all var(--transition);
}
.btn-cancel:hover { border-color: var(--accent); color: var(--accent); }

/* ===== SETTINGS PANEL ===== */
.settings-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity var(--transition);
}
.settings-overlay.active { opacity: 1; pointer-events: all; }

.settings-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 100%; max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.settings-panel h2 {
  color: var(--accent); margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.settings-btn {
  display: block; width: 100%;
  padding: 12px 16px; margin-bottom: 10px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-weight: 600; font-size: 0.9rem;
  text-align: left;
  transition: all var(--transition);
}
.settings-btn:hover {
  border-color: var(--accent);
  background: var(--bg-card-hover);
}
.settings-btn.danger { color: var(--accent); }
.settings-btn.danger:hover { border-color: var(--accent); }

/* ===== POINT BURST ANIMATION (water splash) ===== */
.coin-particle {
  position: fixed;
  width: 10px; height: 10px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 300;
  animation: splashBurst 0.8s ease-out forwards;
}
.coin-particle:nth-child(odd) {
  background: radial-gradient(circle, #48cae4, #00b4d8, #0077b6);
}
.coin-particle:nth-child(even) {
  background: radial-gradient(circle, #ff6b6b, #e63946, #b42d38);
}
@keyframes splashBurst {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); }
}

/* ===== LEVEL UP FLASH ===== */
.level-up-flash {
  position: fixed; inset: 0;
  background: radial-gradient(circle, rgba(230,57,70,0.3), transparent);
  z-index: 250;
  pointer-events: none;
  animation: levelFlash 1s ease-out forwards;
}
@keyframes levelFlash {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

/* ===== CONFETTI (water polo balls & splashes) ===== */
.confetti-container {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 300;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: -10px;
  animation: confettiFall 3s ease-in forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 1rem; }

/* ===== RESPONSIVE ===== */
@media (max-width: 700px) {
  .header-inner { flex-direction: column; align-items: stretch; }
  .header-left { flex-wrap: wrap; }
  .header-stats { flex-direction: column; gap: 8px; }
  .xp-container { min-width: unset; }
  .toolbar { flex-direction: column; position: relative; z-index: 10; }
  .view-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .view-tab { padding: 8px 12px; font-size: 0.78rem; white-space: nowrap; }
  .container { padding: 10px; }
  .modal { padding: 18px; }
  .fab { width: 52px; height: 52px; font-size: 1.6rem; bottom: 20px; right: 20px; }
  .search-wrapper { min-width: unset; width: 100%; }
  .search-box { width: 100%; font-size: 16px; /* prevents iOS zoom on focus */ }
  .sort-select { width: 100%; font-size: 16px; }
  .assignment { padding: 10px 12px; gap: 10px; }
  .assignment-title { font-size: 0.9rem; }
  .assignment-meta { font-size: 0.72rem; }
  .assignment-actions button { width: 32px; height: 32px; font-size: 0.95rem; }
  .section-header { padding: 12px 14px; gap: 8px; }
  .section-name { font-size: 0.8rem; }
  .header-title { font-size: 1rem; letter-spacing: 2px; }
  .coin-display { padding: 5px 12px; font-size: 1rem; }
  .coin-icon { width: 24px; height: 24px; font-size: 14px; }
  .login-box { padding: 28px 24px; }
  .login-box h1 { font-size: 1.3rem; }
}

/* iPhone-specific: prevent text zoom, safe area insets */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .fab { bottom: calc(20px + env(safe-area-inset-bottom)); }
  .container { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
}

/* ===== UTILITY ===== */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ===== TOOLBAR ===== -->

<!-- ===== FAB ===== -->

<!-- ===== ADD/EDIT MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">

      <button id="typeOneTime" class="active" data-type="onetime">One-time</button>

<!-- ===== SETTINGS OVERLAY ===== -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h2>HQ Settings</h2>
    <button class="settings-btn" id="exportBtn">&#x1F4E6; Export Intel as JSON</button>
    <button class="settings-btn danger" id="resetCoinsBtn">&#x1F3D0; Reset Points &amp; Rank</button>
    <button class="settings-btn danger" id="resetAllBtn">&#x1F5D1; Burn All Records</button>
    <button class="settings-btn" id="closeSettingsBtn">Close</button>
  </div>
</div>

<script>
/* =======================================================================
   MISSION CONTROL - Gamified Assignment Dashboard
   Mission Impossible x Water Polo theme
   Pure vanilla JS, localStorage persistence, no dependencies
   ======================================================================= */

// ===== CONSTANTS =====
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_SHORTS = ['S','M','T','W','T','F','S'];

// Level titles: water polo ranks with spy flair
const LEVELS = [
  { title: 'Rookie',      minCoins: 0 },
  { title: 'Starter',     minCoins: 100 },
  { title: 'Captain',     minCoins: 300 },
  { title: 'MVP Agent',   minCoins: 700 },
];
const XP_PER_LEVEL = 100;

// Fixed class sections
const PRESET_SECTIONS = [
  { name: 'English',    color: '#3498db' },
  { name: 'Spanish',    color: '#e67e22' },
  { name: 'Math',       color: '#2ecc71' },
  { name: 'Theology',   color: '#9b59b6' },
  { name: 'US History', color: '#e63946' },
  { name: 'Physics',    color: '#00b4d8' },
];

// ===== USERNAME / LOGIN =====
let currentUser = localStorage.getItem('questBoard_currentUser') || null;

function storageKey(user) {
  return 'questBoard_' + (user || 'default');
}

// ===== DEFAULT STATE =====
function defaultState() {
  return {
    coins: 0,
    streak: 0,
    lastCompletionDate: null,
    theme: 'dark',
    sections: [],
    assignments: [],
    editingId: null,
    seeded: false,
  };
}

// ===== STATE MANAGEMENT =====
let appState = defaultState();

function loadState() {
  try {
    const raw = localStorage.getItem(storageKey(currentUser));
    if (raw) {
      const parsed = JSON.parse(raw);
      return { ...defaultState(), ...parsed };
    }
  } catch (e) { /* ignore */ }
  return defaultState();
}

function saveState() {
  localStorage.setItem(storageKey(currentUser), JSON.stringify(appState));
}

/** Seed preset class sections and starter assignments for a new user */
function seedPresetData() {
  if (appState.seeded) return;

  const sectionIds = {};
  for (const preset of PRESET_SECTIONS) {
    const id = 'sec_' + preset.name.toLowerCase().replace(/\s+/g, '_');
    appState.sections.push({
      id,
      name: preset.name,
      color: preset.color,
      collapsed: false,
    });
    sectionIds[preset.name] = id;
  }

  // Membean: 3 repeating assignments under English, due every Sunday
  for (let i = 1; i <= 3; i++) {
    appState.assignments.push({
      id: 'asgn_membean_' + i,
      title: 'Membean ' + i,
      sectionId: sectionIds['English'],
      type: 'repeating',
      dueDate: null,
      days: [0], // Sunday
      priority: 'med',
      notes: 'Weekly Membean training session. New set starts each Monday, due Sunday.',
      completed: false,
      completedDate: null,
    });
  }

  // Spiral: repeating assignment under Math, every Monday
  appState.assignments.push({
    id: 'asgn_spiral_1',
    title: 'Spiral',
    sectionId: sectionIds['Math'],
    type: 'repeating',
    dueDate: null,
    days: [1], // Monday
    priority: 'med',
    notes: 'Weekly Spiral assignment. Assigned each Monday, due the following Monday.',
    completed: false,
    completedDate: null,
  });

  // --- Last week's assignments (one-time, past due, completable) ---

  // 2 Membean sessions from last week
  appState.assignments.push({
    id: 'asgn_membean_lw1',
    title: 'Membean - Week of 3/2 (Session 1)',
    sectionId: sectionIds['English'],
    type: 'onetime',
    dueDate: '2026-03-06',
    days: null,
    priority: 'med',
    notes: 'Membean training session from last week. Complete your 15-minute session.',
    completed: false,
    completedDate: null,
  });

  appState.assignments.push({
    id: 'asgn_membean_lw2',
    title: 'Membean - Week of 3/2 (Session 2)',
    sectionId: sectionIds['English'],
    type: 'onetime',
    dueDate: '2026-03-06',
    days: null,
    priority: 'med',
    notes: 'Membean training session from last week. Complete your 15-minute session.',
    completed: false,
    completedDate: null,
  });

  // Math Spiral from last week
  appState.assignments.push({
    id: 'asgn_spiral_lw',
    title: 'Spiral - Week of 3/2',
    sectionId: sectionIds['Math'],
    type: 'onetime',
    dueDate: '2026-03-06',
    days: null,
    priority: 'med',
    notes: 'Math Spiral from last week.',
    completed: false,
    completedDate: null,
  });

  appState.seeded = true;
  saveState();
}

// ===== LOGIN FLOW =====
function showLogin() {
  document.getElementById('loginScreen').classList.remove('hidden');
}

function hideLogin() {
  document.getElementById('loginScreen').classList.add('hidden');
}

function doLogin(username) {
  username = username.trim();
  if (!username) return;
  currentUser = username;
  localStorage.setItem('questBoard_currentUser', currentUser);
  appState = loadState();
  if (!appState.seeded) seedPresetData();
  hideLogin();
  updateUserDisplay();
  document.documentElement.setAttribute('data-theme', appState.theme);
  resetRepeatingCompletions();
  saveState();
  render();
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem('questBoard_currentUser');
  appState = defaultState();
  showLogin();
  document.getElementById('usernameInput').value = '';
  document.getElementById('usernameInput').focus();
}

function updateUserDisplay() {
  if (!currentUser) return;
  document.getElementById('userName').textContent = currentUser;
  document.getElementById('userAvatar').textContent = currentUser.charAt(0).toUpperCase();
}

// ===== DATE HELPERS =====
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function startOfWeek(d) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() - dt.getDay());
  return dt.toISOString().slice(0, 10);
}

function endOfWeek(d) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() + (6 - dt.getDay()));
  return dt.toISOString().slice(0, 10);
}

function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

function nextOccurrence(days) {
  if (!days || days.length === 0) return null;
  const today = new Date();
  const todayDay = today.getDay();
  for (let i = 0; i < 7; i++) {
    const check = (todayDay + i) % 7;
    if (days.includes(check)) {
      const d = new Date(today);
      d.setDate(d.getDate() + i);
      return d.toISOString().slice(0, 10);
    }
  }
  return null;
}

function effectiveDue(a) {
  if (a.type === 'repeating') return nextOccurrence(a.days) || todayStr();
  return a.dueDate || '9999-12-31';
}

function isRepeatingDueToday(a) {
  if (a.type !== 'repeating') return false;
  const today = new Date().getDay();
  return a.days && a.days.includes(today);
}

function isRepeatingCompletedToday(a) {
  return a.type === 'repeating' && a.completedDate === todayStr();
}

function isCompleted(a) {
  if (a.type === 'onetime') return a.completed;
  return isRepeatingCompletedToday(a);
}

function isOverdue(a) {
  if (isCompleted(a)) return false;
  if (a.type === 'repeating') return false;
  return a.dueDate && a.dueDate < todayStr();
}

function resetRepeatingCompletions() {
  const today = todayStr();
  for (const a of appState.assignments) {
    if (a.type === 'repeating' && a.completedDate && a.completedDate !== today) {
      a.completedDate = null;
    }
  }
}

// ===== LEVEL HELPERS =====
function getLevel(coins) {
  let lv = LEVELS[0];
  for (const l of LEVELS) {
    if (coins >= l.minCoins) lv = l;
  }
  return lv;
}

function getLevelIndex(coins) {
  let idx = 0;
  for (let i = 0; i < LEVELS.length; i++) {
    if (coins >= LEVELS[i].minCoins) idx = i;
  }
  return idx;
}

function getXpProgress(coins) {
  const idx = getLevelIndex(coins);
  const current = LEVELS[idx].minCoins;
  const next = idx < LEVELS.length - 1 ? LEVELS[idx + 1].minCoins : current + XP_PER_LEVEL;
  const range = next - current;
  const progress = coins - current;
  return Math.min(progress / range, 1);
}

// ===== STREAK LOGIC =====
function updateStreak() {
  const today = todayStr();
  if (appState.lastCompletionDate === today) return;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yStr = yesterday.toISOString().slice(0, 10);
  if (appState.lastCompletionDate === yStr) {
    appState.streak += 1;
  } else if (appState.lastCompletionDate !== today) {
    appState.streak = 1;
  }
  appState.lastCompletionDate = today;
}

// ===== COIN SOUND (Web Audio API) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function playCoinSound() {
  try {
    if (!audioCtx) audioCtx = new AudioCtx();
    const now = audioCtx.currentTime;

    // Two-tone gold coin "cha-ching" sound
    const notes = [1046.5, 1318.5, 1568]; // C6, E6, G6 — bright major chord arpeggio
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + i * 0.08);
      gain.gain.setValueAtTime(0.3, now + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.35);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now + i * 0.08);
      osc.stop(now + i * 0.08 + 0.4);
    });

    // Add a metallic shimmer
    const shimmer = audioCtx.createOscillator();
    const shimmerGain = audioCtx.createGain();
    shimmer.type = 'triangle';
    shimmer.frequency.setValueAtTime(2637, now + 0.15); // E7
    shimmerGain.gain.setValueAtTime(0.12, now + 0.15);
    shimmerGain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
    shimmer.connect(shimmerGain);
    shimmerGain.connect(audioCtx.destination);
    shimmer.start(now + 0.15);
    shimmer.stop(now + 0.6);
  } catch (e) { /* audio not supported */ }
}

// ===== SPLASH/POINT BURST ANIMATION =====
function spawnCoinBurst(x, y, count) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'coin-particle';
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const dist = 40 + Math.random() * 60;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist - 30 + 'px');
    p.style.animationDelay = (Math.random() * 0.15) + 's';
    // Alternate sizes for splash effect
    const size = 6 + Math.random() * 8;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

// ===== CONFETTI (water polo celebration) =====
function launchConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#00b4d8','#e63946','#48cae4','#ff6b6b','#0077b6','#fff','#90e0ef','#b42d38'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    const size = 6 + Math.random() * 10;
    piece.style.width = size + 'px';
    piece.style.height = size + 'px';
    piece.style.borderRadius = Math.random() > 0.3 ? '50%' : '2px';
    piece.style.animationDelay = Math.random() * 1.5 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 5000);
}

// ===== LEVEL UP FLASH =====
function showLevelUp() {
  const flash = document.createElement('div');
  flash.className = 'level-up-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 1100);
}

// ===== POINT EARNING =====
function earnCoins(amount, sourceEl) {
  const oldLevel = getLevelIndex(appState.coins);
  appState.coins += amount;
  const newLevel = getLevelIndex(appState.coins);

  // Play gold coin sound
  playCoinSound();

  let x = window.innerWidth / 2, y = window.innerHeight / 2;
  if (sourceEl) {
    const rect = sourceEl.getBoundingClientRect();
    x = rect.left + rect.width / 2;
    y = rect.top + rect.height / 2;
  }
  spawnCoinBurst(x, y, Math.min(amount, 20));

  if (newLevel > oldLevel) showLevelUp();

  updateStreak();
  saveState();
  renderHeader();
}

// ===== COMPLETE ASSIGNMENT =====
function completeAssignment(id, checkboxEl) {
  const a = appState.assignments.find(x => x.id === id);
  if (!a) return;

  const wasCompleted = isCompleted(a);

  if (a.type === 'onetime') {
    a.completed = !a.completed;
    a.completedDate = a.completed ? todayStr() : null;
  } else {
    if (isRepeatingCompletedToday(a)) {
      a.completedDate = null;
    } else {
      a.completedDate = todayStr();
    }
  }

  const nowCompleted = isCompleted(a);

  if (!wasCompleted && nowCompleted) {
    let coins = a.type === 'repeating' ? 5 : 10;
    if (a.type === 'onetime' && a.dueDate && todayStr() < a.dueDate) {
      coins += 15;
    }
    earnCoins(coins, checkboxEl);
    checkSectionBonus(a.sectionId);
    checkAllTodayDone();
  }

  saveState();
  render();
}

function checkSectionBonus(sectionId) {
  const today = todayStr();
  const sectionAssignments = appState.assignments.filter(a => a.sectionId === sectionId);
  const todayAssignments = sectionAssignments.filter(a => {
    if (a.type === 'onetime') return a.dueDate === today;
    return isRepeatingDueToday(a);
  });
  if (todayAssignments.length > 1 && todayAssignments.every(a => isCompleted(a))) {
    earnCoins(25, document.getElementById('coinDisplay'));
  }
}

function checkAllTodayDone() {
  const todayAssignments = getTodayAssignments();
  if (todayAssignments.length > 0 && todayAssignments.every(a => isCompleted(a))) {
    setTimeout(launchConfetti, 300);
  }
}

// ===== FILTERING =====
let currentView = 'today';
let currentSort = 'dueDate';
let searchQuery = '';

function getTodayAssignments() {
  const today = todayStr();
  return appState.assignments.filter(a => {
    if (a.type === 'onetime') {
      if (a.completed) return false;
      return a.dueDate === today || isOverdue(a);
    }
    return isRepeatingDueToday(a);
  });
}

function filterAssignments() {
  const today = todayStr();
  const weekStart = startOfWeek(today);
  const weekEnd = endOfWeek(today);

  let list = [...appState.assignments];

  switch (currentView) {
    case 'today':
      list = list.filter(a => {
        if (a.type === 'onetime') {
          if (a.completed) return false;
          return a.dueDate === today || isOverdue(a);
        }
        return isRepeatingDueToday(a);
      });
      break;
    case 'week':
      list = list.filter(a => {
        if (a.type === 'onetime') {
          if (a.completed) return false;
          return (a.dueDate >= weekStart && a.dueDate <= weekEnd) || isOverdue(a);
        }
        return true;
      });
      break;
    case 'upcoming':
      list = list.filter(a => {
        if (a.type === 'onetime') return !a.completed;
        return true;
      });
      break;
    case 'completed':
      list = list.filter(a => isCompleted(a));
      break;
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(a => {
      const section = appState.sections.find(s => s.id === a.sectionId);
      return a.title.toLowerCase().includes(q) ||
             (a.notes && a.notes.toLowerCase().includes(q)) ||
             (section && section.name.toLowerCase().includes(q));
    });
  }

  const priorityOrder = { high: 0, med: 1, low: 2 };
  list.sort((a, b) => {
    switch (currentSort) {
      case 'dueDate': return effectiveDue(a).localeCompare(effectiveDue(b));
      case 'class': return (a.sectionId || '').localeCompare(b.sectionId || '');
      case 'priority': return (priorityOrder[a.priority] || 1) - (priorityOrder[b.priority] || 1);
      default: return 0;
    }
  });

  return list;
}

// ===== RENDERING =====

function renderHeader() {
  document.getElementById('coinCount').textContent = appState.coins;
  document.getElementById('streakCount').textContent = appState.streak;

  const level = getLevel(appState.coins);
  const lvIdx = getLevelIndex(appState.coins);
  document.getElementById('levelTitle').textContent = level.title;
  document.getElementById('xpLabel').textContent = 'Lv ' + (lvIdx + 1);
  document.getElementById('xpBar').style.width = (getXpProgress(appState.coins) * 100) + '%';

  document.getElementById('themeToggle').innerHTML = appState.theme === 'dark' ? '&#x263E;' : '&#x2600;';
}

function renderSections() {
  const container = document.getElementById('sectionsContainer');
  const filtered = filterAssignments();

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${currentView === 'completed' ? '\u{1F3D0}' : '\u{1F4CB}'}</div>
      <p>${currentView === 'completed' ? 'No completed missions yet. Get in the pool, agent!' : 'No active missions. Hit + to deploy one!'}</p>
    </div>`;
    return;
  }

  const groups = new Map();
  for (const a of filtered) {
    if (!groups.has(a.sectionId)) groups.set(a.sectionId, []);
    groups.get(a.sectionId).push(a);
  }

  let html = '';
  for (const [sectionId, assignments] of groups) {
    const section = appState.sections.find(s => s.id === sectionId);
    if (!section) continue;

    const isCollapsed = section.collapsed ? 'collapsed' : '';
    const total = assignments.length;
    const done = assignments.filter(a => isCompleted(a)).length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const incomplete = total - done;

    const hasTodayIncomplete = assignments.some(a => !isCompleted(a) && (
      (a.type === 'onetime' && a.dueDate === todayStr()) || isRepeatingDueToday(a)
    ));

    html += `<div class="section ${isCollapsed}" data-section-id="${section.id}">
      <div class="section-header" onclick="toggleSection('${section.id}')">
        <div class="section-color" style="background:${section.color}"></div>
        <div class="section-name">${escHtml(section.name)}</div>
        ${incomplete > 0 ? `<span class="section-badge">${incomplete} active</span>` : ''}
        <div class="section-progress">
          <div class="section-progress-bar" style="width:${pct}%"></div>
        </div>
        <span class="section-chevron">\u25BC</span>
      </div>
      <div class="section-body">
        ${hasTodayIncomplete ? `<div class="section-actions">
          <button class="btn-complete-all" onclick="completeAllSection('${section.id}')">Complete All Today</button>
        </div>` : ''}
        ${assignments.map(a => renderAssignment(a)).join('')}
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

function renderAssignment(a) {
  const completed = isCompleted(a);
  const overdue = isOverdue(a);

  let dueBadge = '';
  if (a.type === 'onetime' && a.dueDate) {
    if (overdue) {
      dueBadge = `<span class="badge badge-overdue">\u{1F6A8} OVERDUE</span>`;
    } else {
      const daysLeft = daysBetween(todayStr(), a.dueDate);
      if (daysLeft === 0) dueBadge = `<span>Due today</span>`;
      else if (daysLeft === 1) dueBadge = `<span>Due tomorrow</span>`;
      else dueBadge = `<span>Due ${a.dueDate}</span>`;
    }
  } else if (a.type === 'repeating') {
    const dayLabels = (a.days || []).map(d => DAY_NAMES[d]).join(', ');
    dueBadge = `<span class="badge badge-repeat">\u{1F501} ${dayLabels}</span>`;
    const next = nextOccurrence(a.days);
    if (next && next !== todayStr()) dueBadge += `<span>Next: ${next}</span>`;
  }

  let earlyBadge = '';
  if (!completed && a.type === 'onetime' && a.dueDate && todayStr() < a.dueDate) {
    earlyBadge = `<span class="badge badge-early">+15 early bonus</span>`;
  }

  const classes = ['assignment'];
  if (completed) classes.push('completed-card');
  if (overdue) classes.push('overdue');

  return `<div class="${classes.join(' ')}">
    <label class="checkbox-wrapper">
      <input type="checkbox" ${completed ? 'checked' : ''} onchange="completeAssignment('${a.id}', this)">
      <div class="checkbox-visual"></div>
    </label>
    <div class="assignment-content">
      <div class="assignment-title">${escHtml(a.title)}</div>
      <div class="assignment-meta">
        <span><span class="priority-dot priority-${a.priority}"></span> ${a.priority}</span>
        ${dueBadge}
        ${earlyBadge}
        ${a.notes ? `<span title="${escHtml(a.notes)}">\u{1F4DD}</span>` : ''}
      </div>
    </div>
    <div class="assignment-actions">
      <button onclick="editAssignment('${a.id}')" title="Edit">\u270E</button>
      <button class="delete-btn" onclick="deleteAssignment('${a.id}')" title="Delete">\u2716</button>
    </div>
  </div>`;
}

function render() {
  renderHeader();
  renderSections();
}

// ===== SECTION TOGGLING =====
function toggleSection(id) {
  const s = appState.sections.find(x => x.id === id);
  if (s) { s.collapsed = !s.collapsed; saveState(); render(); }
}

// ===== COMPLETE ALL IN SECTION =====
function completeAllSection(sectionId) {
  const today = todayStr();
  const targets = appState.assignments.filter(a =>
    a.sectionId === sectionId && !isCompleted(a) && (
      (a.type === 'onetime' && (a.dueDate === today || isOverdue(a))) ||
      isRepeatingDueToday(a)
    )
  );
  for (const a of targets) {
    if (a.type === 'onetime') { a.completed = true; a.completedDate = today; }
    else { a.completedDate = today; }
    const coins = a.type === 'repeating' ? 5 : 10;
    appState.coins += coins;
  }
  if (targets.length > 0) {
    for (const a of targets) {
      if (a.type === 'onetime' && a.dueDate && today < a.dueDate) appState.coins += 15;
    }
    updateStreak();
    spawnCoinBurst(window.innerWidth / 2, window.innerHeight / 2, 15);
    if (targets.length > 1) earnCoins(25, document.getElementById('coinDisplay'));
    checkAllTodayDone();
  }
  saveState();
  render();
}

// ===== DELETE ASSIGNMENT =====
function deleteAssignment(id) {
  if (!confirm('Abort this mission?')) return;
  appState.assignments = appState.assignments.filter(a => a.id !== id);
  saveState();
  render();
}

// ===== EDIT ASSIGNMENT =====
function editAssignment(id) {
  const a = appState.assignments.find(x => x.id === id);
  if (!a) return;
  appState.editingId = id;
  openModal();
  document.getElementById('inputTitle').value = a.title;
  document.getElementById('inputSection').value = a.sectionId;
  document.getElementById('inputPriority').value = a.priority;
  document.getElementById('inputNotes').value = a.notes || '';

  setAssignmentType(a.type);
  if (a.type === 'onetime') {
    document.getElementById('inputDueDate').value = a.dueDate || '';
  } else {
    selectedDays = [...(a.days || [])];
    renderDaysPicker();
  }

  document.getElementById('modalTitle').textContent = 'Edit Mission';
  document.getElementById('saveBtn').textContent = 'Update Mission';
}

// ===== MODAL =====
let selectedType = 'onetime';
let selectedDays = [];

function openModal() {
  document.getElementById('modalOverlay').classList.add('active');
  populateSectionDropdown();
  renderDaysPicker();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputDueDate').value = '';
  document.getElementById('inputNotes').value = '';
  document.getElementById('inputPriority').value = 'med';
  selectedDays = [];
  setAssignmentType('onetime');
  appState.editingId = null;
  document.getElementById('modalTitle').textContent = 'New Mission';
  document.getElementById('saveBtn').textContent = 'Deploy Mission';
}

function setAssignmentType(type) {
  selectedType = type;
  document.getElementById('typeOneTime').classList.toggle('active', type === 'onetime');
  document.getElementById('typeRepeating').classList.toggle('active', type === 'repeating');
  document.getElementById('dueDateGroup').classList.toggle('hidden', type !== 'onetime');
  document.getElementById('daysGroup').classList.toggle('hidden', type !== 'repeating');
}

function populateSectionDropdown() {
  const sel = document.getElementById('inputSection');
  sel.innerHTML = PRESET_SECTIONS.map(p => {
    const id = 'sec_' + p.name.toLowerCase().replace(/\s+/g, '_');
    return `<option value="${id}">${escHtml(p.name)}</option>`;
  }).join('');
}

function renderDaysPicker() {
  const container = document.getElementById('daysPicker');
  container.innerHTML = DAY_SHORTS.map((label, i) =>
    `<button class="day-btn ${selectedDays.includes(i) ? 'active' : ''}"
             onclick="toggleDay(${i})">${label}</button>`
  ).join('');
}

function toggleDay(i) {
  const idx = selectedDays.indexOf(i);
  if (idx >= 0) selectedDays.splice(idx, 1);
  else selectedDays.push(i);
  renderDaysPicker();
}

function saveAssignment() {
  const title = document.getElementById('inputTitle').value.trim();
  const sectionId = document.getElementById('inputSection').value;
  const priority = document.getElementById('inputPriority').value;
  const notes = document.getElementById('inputNotes').value.trim();

  if (!title) { alert('Mission briefing required, agent.'); return; }
  if (!sectionId) { alert('Select a department.'); return; }

  const data = {
    title, sectionId, priority, notes,
    type: selectedType,
  };

  if (selectedType === 'onetime') {
    data.dueDate = document.getElementById('inputDueDate').value || null;
    data.days = null;
  } else {
    data.dueDate = null;
    data.days = [...selectedDays];
    if (data.days.length === 0) { alert('Select at least one day for the repeat cycle.'); return; }
  }

  if (appState.editingId) {
    const a = appState.assignments.find(x => x.id === appState.editingId);
    if (a) Object.assign(a, data);
  } else {
    data.id = 'asgn_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    data.completed = false;
    data.completedDate = null;
    appState.assignments.push(data);
  }

  saveState();
  closeModal();
  render();
}

// ===== THEME =====
function toggleTheme() {
  appState.theme = appState.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', appState.theme);
  saveState();
  renderHeader();
}

// ===== SETTINGS =====
function openSettings() {
  document.getElementById('settingsOverlay').classList.add('active');
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('active');
}

function exportData() {
  const data = JSON.stringify({ sections: appState.sections, assignments: appState.assignments }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'mission-control-export.json';
  link.click();
  URL.revokeObjectURL(url);
}

function resetCoins() {
  if (!confirm('Reset all points and rank to zero?')) return;
  appState.coins = 0;
  appState.streak = 0;
  appState.lastCompletionDate = null;
  saveState();
  render();
}

function resetAll() {
  if (!confirm('This will burn ALL records. Are you sure, agent?')) return;
  if (!confirm('Final confirmation. This cannot be undone!')) return;
  localStorage.removeItem(storageKey(currentUser));
  appState = defaultState();
  seedPresetData();
  saveState();
  render();
  closeSettings();
}

// ===== UTILITIES =====
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== EVENT LISTENERS =====
document.addEventListener('DOMContentLoaded', () => {
  const loginBtn = document.getElementById('loginBtn');
  const usernameInput = document.getElementById('usernameInput');

  loginBtn.addEventListener('click', () => doLogin(usernameInput.value));
  usernameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin(usernameInput.value);
  });

  document.getElementById('logoutBtn').addEventListener('click', doLogout);

  if (currentUser) {
    appState = loadState();
    if (!appState.seeded) seedPresetData();
    hideLogin();
    updateUserDisplay();
    document.documentElement.setAttribute('data-theme', appState.theme);
    resetRepeatingCompletions();
    saveState();
    render();
  } else {
    showLogin();
  }

  document.getElementById('viewTabs').addEventListener('click', e => {
    const tab = e.target.closest('.view-tab');
    if (!tab) return;
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    render();
  });

  document.getElementById('sortSelect').addEventListener('change', e => {
    currentSort = e.target.value;
    render();
  });

  document.getElementById('searchBox').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });

  document.getElementById('addFab').addEventListener('click', openModal);

  document.getElementById('typeOneTime').addEventListener('click', () => setAssignmentType('onetime'));
  document.getElementById('typeRepeating').addEventListener('click', () => setAssignmentType('repeating'));

  document.getElementById('saveBtn').addEventListener('click', saveAssignment);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  document.getElementById('themeToggle').addEventListener('click', toggleTheme);

  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  document.getElementById('closeSettingsBtn').addEventListener('click', closeSettings);
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('resetCoinsBtn').addEventListener('click', resetCoins);
  document.getElementById('resetAllBtn').addEventListener('click', resetAll);
  document.getElementById('settingsOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeSettings();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeModal();
      closeSettings();
    }
  });
});
</script>
